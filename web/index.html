<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4A90D9">
    <meta name="description" content="照片整理工具 - 批量选择和移动照片">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="照片整理">
    <meta name="mobile-web-app-capable" content="yes">
    <title>照片整理工具</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- PWA 安装提示横幅 -->
        <div class="install-banner" id="installBanner" style="display: none;">
            <div class="install-banner-content">
                <span class="install-icon">📲</span>
                <div class="install-text">
                    <strong>安装到主屏幕</strong>
                    <small>像 App 一样使用，更方便</small>
                </div>
            </div>
            <div class="install-banner-actions">
                <button class="btn-install-later" id="btnInstallLater">稍后</button>
                <button class="btn-install-now" id="btnInstallNow">安装</button>
            </div>
        </div>

        <!-- iOS 安装引导 -->
        <div class="ios-install-guide" id="iosInstallGuide" style="display: none;">
            <div class="ios-guide-content">
                <button class="guide-close" id="closeIosGuide">×</button>
                <h3>📱 添加到主屏幕</h3>
                <div class="guide-steps">
                    <div class="guide-step">
                        <span class="step-num">1</span>
                        <p>点击底部的 <strong>"分享"</strong> 按钮</p>
                        <div class="step-icon">📤</div>
                    </div>
                    <div class="guide-step">
                        <span class="step-num">2</span>
                        <p>向下滑动，找到 <strong>"添加到主屏幕"</strong></p>
                        <div class="step-icon">➕</div>
                    </div>
                    <div class="guide-step">
                        <span class="step-num">3</span>
                        <p>点击右上角 <strong>"添加"</strong></p>
                        <div class="step-icon">✅</div>
                    </div>
                </div>
                <p class="guide-hint">安装后可离线使用，体验更流畅</p>
            </div>
        </div>

        <!-- 顶部栏 -->
        <header class="header">
            <div class="folder-info">
                <span class="folder-icon">📁</span>
                <span class="folder-name" id="currentFolder">点击选择照片文件夹</span>
                <button class="btn-icon" id="btnSelectFolder" title="选择文件夹">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                    </svg>
                </button>
            </div>
            <div class="stats" id="stats">
                <span class="stat-item">📊 0张照片</span>
                <span class="stat-item">已选 0张</span>
                <span class="stat-item">0 MB</span>
            </div>
        </header>

        <!-- 子文件夹区 -->
        <section class="subfolder-section" id="subfolderSection">
            <div class="subfolder-header">
                <span class="subfolder-title">📂 子文件夹</span>
                <button class="btn-small" id="btnNewFolder">+ 新建</button>
            </div>
            <div class="subfolder-list" id="subfolderList">
                <!-- 动态生成的子文件夹标签 -->
            </div>
        </section>

        <!-- 照片网格 -->
        <main class="photo-grid-container">
            <div class="photo-grid" id="photoGrid">
                <!-- 动态生成的照片缩略图 -->
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📷</div>
                <p>暂无照片</p>
                <p class="empty-hint">请选择包含照片的文件夹</p>
            </div>
            <div class="loading-state" id="loadingState" style="display: none;">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </main>

        <!-- 底部操作栏 -->
        <footer class="action-bar" id="actionBar">
            <div class="action-buttons">
                <button class="btn-action" id="btnSelectAll">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM17.99 9l-1.41-1.42-6.59 6.59-2.58-2.57-1.42 1.41 4 3.99z"/>
                    </svg>
                    全选
                </button>
                <button class="btn-action" id="btnDeselectAll">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                    </svg>
                    反选
                </button>
                <div class="move-dropdown">
                    <button class="btn-action btn-primary" id="btnMove">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10H6v-2h8v2zm4-4H6v-2h12v2z"/>
                        </svg>
                        移动到 ▼
                    </button>
                    <div class="dropdown-content" id="moveDropdown">
                        <!-- 动态生成的目标文件夹列表 -->
                    </div>
                </div>
                <button class="btn-action btn-danger" id="btnDelete">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                    删除
                </button>
            </div>
        </footer>

        <!-- 新建文件夹对话框 -->
        <div class="modal" id="newFolderModal">
            <div class="modal-content">
                <h3>新建子文件夹</h3>
                <input type="text" id="newFolderName" placeholder="输入文件夹名称" maxlength="50">
                <div class="modal-buttons">
                    <button class="btn-secondary" id="btnCancelNewFolder">取消</button>
                    <button class="btn-primary" id="btnConfirmNewFolder">创建</button>
                </div>
            </div>
        </div>

        <!-- 确认对话框 -->
        <div class="modal" id="confirmModal">
            <div class="modal-content">
                <h3 id="confirmTitle">确认操作</h3>
                <p id="confirmMessage">确定要执行此操作吗？</p>
                <div class="modal-buttons">
                    <button class="btn-secondary" id="btnCancelConfirm">取消</button>
                    <button class="btn-danger" id="btnConfirmAction">确定</button>
                </div>
            </div>
        </div>

        <!-- Toast 通知 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="js/fileSystem.js"></script>
    <script src="js/photoGrid.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
